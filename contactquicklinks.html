<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Benjamin Fedoruk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .contact-option {
            display: block;
            width: 100%;
            padding: 16px 24px;
            margin-bottom: 15px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .call-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }
        
        .call-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
        }
        
        .text-btn {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }
        
        .text-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(33, 150, 243, 0.3);
        }
        
        .email-btn {
            background: linear-gradient(135deg, #FF5722, #E64A19);
            color: white;
        }
        
        .email-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 87, 34, 0.3);
        }
        
        .booking-btn {
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
        }
        
        .booking-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(156, 39, 176, 0.3);
        }
        
        .icon {
            margin-right: 10px;
            font-size: 18px;
        }
        
        .phone-number {
            color: #34495e;
            font-size: 14px;
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .contact-option {
                padding: 14px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Benjamin</h1>
        <p class="subtitle">Choose your preferred method</p>
        
        <a href="tel:+13653637000" class="contact-option call-btn">
            <span class="icon">📞</span>
            Call Me
        </a>
        
        <a href="sms:+13653637000" class="contact-option text-btn">
            <span class="icon">💬</span>
            Send Text
        </a>
        
        <a href="mailto:benjamin.fedoruk@ontariotechu.ca" class="contact-option email-btn">
            <span class="icon">✉️</span>
            Send Email
        </a>
        
        <a href="https://ontariotech.quadc.io/search/scheduler?tutorId=vKSSLN4XzwmkyoDXt&tutorName=Ben%20F." class="contact-option booking-btn" target="_blank">
            <span class="icon">📅</span>
            Book Me
        </a>
        
        <div class="phone-number">
            <strong>Phone:</strong> (365) 363-7000<br>
            <strong>Email:</strong> benjamin.fedoruk@ontariotechu.ca
        </div>
    </div>
</body>
</html>
